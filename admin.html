<!DOCTYPE html>
<html lang="it">
<head>
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Coptic Mass Content Creator</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'], arabic: ['Cairo', 'sans-serif'] },
                    colors: { coptic: { gold: '#D4AF37', red: '#8B0000', dark: '#1a1a1a', light: '#f9f9f9', surface: '#ffffff' } }
                }
            }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>

    <style>
        .drag-handle { cursor: grab; }
        .drag-handle:active { cursor: grabbing; }
        .ghost-item { opacity: 0.4; background: #f3f4f6; }
        .chosen-item { box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); border: 2px solid #D4AF37; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 h-screen flex flex-col font-sans overflow-hidden">
    
    <header class="shrink-0 bg-white shadow-md px-6 py-4 flex justify-between items-center border-b border-gray-200 z-50">
        <div class="flex items-center gap-4">
            <div class="w-10 h-10 rounded bg-coptic-red flex items-center justify-center text-coptic-gold">
                <i class="fa-solid fa-pen-to-square"></i>
            </div>
            <div>
                <h1 class="font-bold text-xl leading-tight">Content Creator</h1>
                <p class="text-xs text-gray-500">Drag items to your Sequence</p>
            </div>
            <div class="ml-8 relative w-64">
                <i class="fa-solid fa-search absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                <input type="text" id="search-input" placeholder="Search files..." class="w-full pl-10 pr-4 py-2 bg-gray-100 border border-gray-200 rounded-lg focus:border-coptic-gold focus:bg-white focus:ring-0 transition text-sm">
            </div>
        </div>
        
        <div class="flex items-center gap-4">
            <span id="stats-counter" class="text-sm text-gray-500 font-medium"></span>
            
            <input type="file" id="import-file" accept=".json" class="hidden">
            <button id="import-btn" class="px-4 py-2 rounded-lg bg-gray-100 text-gray-700 font-semibold hover:bg-gray-200 border border-gray-300 transition flex items-center gap-2 shadow-sm text-sm">
                <i class="fa-solid fa-file-import"></i> Import data.json
            </button>

            <button id="download-btn" class="px-5 py-2 rounded-lg bg-coptic-gold text-white font-bold hover:bg-yellow-600 transition flex items-center gap-2 shadow text-sm">
                <i class="fa-solid fa-download"></i> Download data.json
            </button>
        </div>
    </header>

    <main class="flex-1 flex overflow-hidden p-4 gap-6">
        
        <!-- Left Pane: Library (Stacked vertically in 3 parts) -->
        <div class="w-1/3 flex flex-col gap-4">
            <!-- Priest Pane -->
            <div class="flex-1 flex flex-col bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                <div class="p-2 border-b border-gray-200 bg-purple-50 text-purple-900 font-bold flex justify-between items-center shrink-0">
                    <span class="text-sm"><i class="fa-solid fa-cross mr-2"></i> Priest</span>
                    <span id="count-priest" class="text-xs bg-purple-200 px-2 py-0.5 rounded-full">0</span>
                </div>
                <div class="flex-1 overflow-y-auto p-2 bg-gray-50">
                    <ul id="library-priest" class="space-y-2 min-h-full"></ul>
                </div>
            </div>

            <!-- Deacon Pane -->
            <div class="flex-1 flex flex-col bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                <div class="p-2 border-b border-gray-200 bg-blue-50 text-blue-900 font-bold flex justify-between items-center shrink-0">
                    <span class="text-sm"><i class="fa-solid fa-book-bible mr-2"></i> Deacon</span>
                    <span id="count-deacon" class="text-xs bg-blue-200 px-2 py-0.5 rounded-full">0</span>
                </div>
                <div class="flex-1 overflow-y-auto p-2 bg-gray-50">
                    <ul id="library-deacon" class="space-y-2 min-h-full"></ul>
                </div>
            </div>

            <!-- Congregation Pane -->
            <div class="flex-1 flex flex-col bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                <div class="p-2 border-b border-gray-200 bg-green-50 text-green-900 font-bold flex justify-between items-center shrink-0">
                    <span class="text-sm"><i class="fa-solid fa-users mr-2"></i> Congregation</span>
                    <span id="count-congregation" class="text-xs bg-green-200 px-2 py-0.5 rounded-full">0</span>
                </div>
                <div class="flex-1 overflow-y-auto p-2 bg-gray-50">
                    <ul id="library-congregation" class="space-y-2 min-h-full"></ul>
                </div>
            </div>
        </div>

        <!-- Right Pane: Sequence -->
        <div class="w-2/3 flex flex-col bg-white rounded-xl shadow-sm border-2 border-coptic-gold overflow-hidden">
            <div class="p-3 border-b border-gray-200 bg-coptic-gold text-white font-bold flex justify-between items-center shrink-0">
                <span><i class="fa-solid fa-list-ol mr-2"></i> Working Sequence</span>
                <span id="count-sequence" class="text-xs bg-yellow-600 px-2 py-1 rounded-full">0</span>
            </div>
            <div class="flex-1 overflow-y-auto p-4 bg-gray-50">
                <ul id="sequence-list" class="space-y-3 min-h-[300px] rounded-xl p-2 bg-white/50">
                </ul>
            </div>
        </div>

    </main>

    <script src="js/admin.js"></script>
</body>
</html>
